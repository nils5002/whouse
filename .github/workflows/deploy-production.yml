name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: warehouse-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - cloud-web-prod
    timeout-minutes: 45
    steps:
      - name: Run deploy script on production server
        shell: bash
        run: |
          set -euo pipefail
          sudo /opt/web/cloud_web/deploy/server/deploy.sh main

      - name: External health check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --max-time 20 https://warehouse.nilshome.loan/ > /dev/null
